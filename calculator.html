<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bingo Calculator · A-Math</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0b1220; color:#e2e8f0; -webkit-tap-highlight-color:transparent; }
  .wrap { max-width:680px; margin:0 auto; padding:14px; }
  .header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .back-btn { background:none; border:none; color:#e2e8f0; font-size:26px; cursor:pointer; padding:4px 8px; }
  h1 { font-size:20px; margin:0; color:#fbbf24; }
  .panel { background:#0f1b2e; border:1px solid #1e293b; border-radius:16px; padding:16px; margin-bottom:14px; }
  h2 { font-size:16px; margin:0 0 10px; }
  .hint { color:#94a3b8; font-size:13px; line-height:1.5; margin:6px 0; }
  .btn { padding:11px 16px; border:none; border-radius:12px; font-size:15px; font-weight:700;
    cursor:pointer; font-family:inherit; }
  .btn-amber { background:#fbbf24; color:#1f2937; }
  .btn-primary { background:#22c55e; color:#06281a; }
  .btn-ghost { background:#0b1220; color:#94a3b8; border:1px solid #334155; }
  .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
  select { background:#0f172a; color:#e2e8f0; border:1px solid #475569; border-radius:10px;
    padding:9px; font-size:14px; font-family:inherit; }

  #rack-wrap { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin:12px 0; }

  /* A-Math game tile — matches the cream/amber identity from the main game */
  .gtile { position:relative; display:inline-flex; align-items:center; justify-content:center;
    background:#fef3c7; border:2px solid #f59e0b; border-radius:9px; color:#1f2937;
    font-weight:800; line-height:1; box-shadow:0 2px 0 rgba(0,0,0,.28); flex:0 0 auto; }
  .gtile .pts { position:absolute; right:3px; bottom:2px; font-size:9px; font-weight:700; color:#a16207; }
  .gtile.choice span { letter-spacing:-1px; }
  .key .gtile.choice span, .rack-slot .gtile.choice span { font-size:16px; }
  .eqrow .gtile.choice span, .rank-row .gtile.choice span { font-size:13px; }
  .gtile.blank { border-style:dashed; background:#fffbeb; color:#b45309; }
  .gtile.fixed { background:#bfdbfe; border-color:#2563eb; color:#1e3a5f; }
  .gtile.fixed .pts { color:#1d4ed8; }
  .gtile.blank .qmark { position:absolute; left:3px; top:1px; font-size:9px; color:#d97706; font-weight:800; }

  .rack-slot { flex:0 0 calc((100% - 36px) / 8); aspect-ratio:1; cursor:pointer; }
  .rack-slot.empty { border:2px dashed #475569; border-radius:9px; background:#0f172a;
    display:flex; align-items:center; justify-content:center; color:#475569; font-size:22px; font-weight:700; }
  .rack-slot .gtile { width:100%; height:100%; font-size:22px; }

  /* calculator keypad — tap tiles to type into the rack */
  #keypad { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin-top:8px; }
  .key { aspect-ratio:1; padding:0; border:none; background:none; cursor:pointer; }
  .key .gtile { width:100%; height:100%; font-size:22px; }
  .key:active .gtile { transform:translateY(1px); box-shadow:0 1px 0 rgba(0,0,0,.28); }

  /* board row-0 strip (crossing mode) */
  #board-strip { display:flex; gap:2px; padding:4px 0 8px; }
  .bcell { flex:1 1 0; min-width:0; aspect-ratio:1; border-radius:4px; position:relative; cursor:pointer;
    display:flex; align-items:center; justify-content:center; background:#13243d; border:1px solid #24344f; }
  .bcell .lbl { font-size:7px; font-weight:800; color:#fff; opacity:.85; }
  .bcell.p3E { background:#dc2626; } .bcell.p2E { background:#f59e0b; }
  .bcell.p3T { background:#2563eb; } .bcell.p2T { background:#f97316; }
  .bcell.sel { outline:2px solid #fbbf24; outline-offset:-1px; z-index:1; }
  .bcell .gtile { width:100%; height:100%; font-size:13px; border-radius:4px; }
  .bcell .gtile .pts { font-size:7px; right:1px; bottom:0; }
  .bcell .colno { position:absolute; top:-1px; left:1px; font-size:6px; color:#64748b; }

  .find-row { display:flex; gap:8px; align-items:stretch; margin-bottom:10px; }
  .find-row select { flex:1; min-width:0; }
  .find-row #btn-find { flex:0 0 auto; padding-left:20px; padding-right:20px; }

  /* results */
  #results { margin-top:4px; }
  .score-badge { display:inline-flex; align-items:center; gap:5px; background:#fbbf24; color:#1f2937;
    font-weight:800; font-size:14px; padding:4px 12px; border-radius:999px; }
  .eqrow { display:flex; flex-wrap:nowrap; align-items:center; gap:5px; margin:8px 0; overflow-x:auto; padding-bottom:2px; }
  .eqrow .numgroup { display:flex; gap:1px; flex:0 0 auto; }
  .eqrow .gtile { width:34px; height:34px; font-size:16px; border-radius:7px; }
  .blank-note { display:inline-block; color:#b45309; background:#fffbeb; border:1px dashed #f59e0b; border-radius:6px;
    padding:1px 6px; font-size:12px; font-weight:700; }
  .hook-card { background:#0b1220; border:1px solid #1e293b; border-radius:12px; padding:12px; margin:8px 0; }
  .rank-row { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .rank-row .gtile { width:42px; height:42px; font-size:19px; border-radius:8px; flex:0 0 auto; }
  .rank-num { flex:0 0 auto; padding:3px 9px; border-radius:7px; background:#1e293b; color:#cbd5e1;
    font-weight:800; font-size:13px; }
  .rank-num.r1 { background:#fbbf24; color:#1f2937; }
  .rank-num.r2 { background:#cbd5e1; color:#1f2937; }
  .rank-num.r3 { background:#d68a4f; color:#fff; }
  .muted { color:#94a3b8; font-size:13px; line-height:1.5; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <button class="back-btn" onclick="window.location.href='lobby.html'">←</button>
      <h1>🧮 Bingo Calculator</h1>
    </div>

    <div class="panel">
      <h2>Your tiles</h2>
      <div id="board-strip-wrap" style="display:none;">
        <p class="hint" style="margin-top:0;">Board row 0 — tap a square, then tap a tile below to lock it on the board. Tap a locked square to clear it.</p>
        <div id="board-strip"></div>
      </div>
      <div id="rack-wrap"></div>
      <div class="btn-row">
        <button class="btn btn-ghost" id="btn-back">⌫ Back</button>
        <button class="btn btn-ghost" id="btn-clear">Clear</button>
        <button class="btn btn-amber" id="calc-photo" aria-label="Pick from folder">📁</button>
        <input id="calc-photo-input" type="file" accept="image/*" style="display:none;">
        <button class="btn btn-amber" id="calc-camera" aria-label="Take a photo">📸</button>
        <input id="calc-camera-input" type="file" accept="image/*" capture="environment" style="display:none;">
      </div>
      <div id="cam-status" class="hint"></div>

      <p class="hint" style="margin-top:12px;">Tap tiles to add them (left to right). Tap a tile in your rack to remove it.</p>
      <div id="keypad"></div>
    </div>

    <div class="panel">
      <h2>Find bingos</h2>
      <div class="find-row">
        <select id="mode-select">
          <option value="9">9-tile bingo</option>
          <option value="8">8-tile bingo</option>
          <option value="all">Any length bingo</option>
          <option value="cross">Tile crossing bingo</option>
        </select>
        <button class="btn btn-primary" id="btn-find">Find</button>
      </div>
      <div id="results"></div>
    </div>

    <div class="panel">
      <label style="display:flex; align-items:center; gap:10px; margin:0; font-size:14px;">
        <span style="font-weight:700;">Tile set:</span>
        <select id="tileset-select" style="flex:1; min-width:0;">
          <option value="prathom">Prathom — Elementary (70 tiles)</option>
          <option value="mathayom">Mathayom — Secondary (100 tiles)</option>
        </select>
      </label>
    </div>
  </div>

  <script src="js/constants.js?v=v90-en"></script>
  <script src="js/utils.js?v=v90-en"></script>
  <script src="js/evaluator.js?v=v90-en"></script>
  <script src="js/settings.js?v=v90-en"></script>
  <script src="js/bingo-solver.js?v=v111-cross"></script>
  <script src="js/scan-ai.js?v=v86-temp" type="module"></script>
  <script src="js/scan-camera.js?v=v134-debug"></script>
  <script src="js/calculator.js?v=v125-byok"></script>
</body>
</html>
