<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Math — Lobby</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="lobby.css">
</head>
<body>

  <!-- ============================================================ -->
  <!-- LOGIN SCREEN -->
  <!-- ============================================================ -->
  <div id="screen-login" class="screen active">
    <div class="login-card">
      <div class="logo">
        <span class="logo-icon">🧮</span>
        <h1>A-Math</h1>
        <p class="tagline">Math Board Game</p>
      </div>

      <div class="login-buttons">
        <button id="btn-google" class="btn-login btn-google" onclick="AMathLobby.loginGoogle()">
          <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Sign in with Google
        </button>

        <div class="divider"><span>or</span></div>

        <div id="email-form" class="email-form">
          <input type="email" id="input-email" placeholder="Email" autocomplete="email">
          <input type="password" id="input-password" placeholder="Password" autocomplete="current-password">
          <div class="email-buttons">
            <button class="btn-login btn-email" onclick="AMathLobby.loginEmail()">Sign In</button>
            <button class="btn-login btn-register" onclick="AMathLobby.registerEmail()">Register</button>
          </div>
        </div>
      </div>

      <button class="btn-guest" onclick="AMathLobby.playGuest()">Play as Guest →</button>

      <div id="login-error" class="error-msg"></div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- PROFILE SETUP (first time) -->
  <!-- ============================================================ -->
  <div id="screen-profile-setup" class="screen">
    <div class="setup-card">
      <h2>Set Up Profile</h2>

      <div class="avatar-section">
        <div class="avatar-preview" id="avatar-preview">
          <img id="avatar-img" src="" alt="">
          <div class="avatar-placeholder">📷</div>
        </div>
        <label class="btn-upload" for="avatar-upload">Change Photo</label>
        <input type="file" id="avatar-upload" accept="image/*" style="display:none"
               onchange="AMathLobby.handleAvatarUpload(event)">
      </div>

      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="input-display-name" placeholder="e.g., ริวจิ" maxlength="20">
      </div>

      <div class="form-group">
        <label>School (optional)</label>
        <input type="text" id="input-school" placeholder="e.g., สาธิตจุฬา" maxlength="40">
      </div>

      <button class="btn-primary" onclick="AMathLobby.saveProfile()">Save & Continue</button>
      <div id="profile-error" class="error-msg"></div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MAIN LOBBY -->
  <!-- ============================================================ -->
  <div id="screen-lobby" class="screen">
    <header class="lobby-header">
      <div class="user-info" onclick="AMathLobby.showProfile()">
        <img id="lobby-avatar" class="lobby-avatar" src="" alt="">
        <div>
          <div id="lobby-name" class="lobby-name">Player</div>
          <div id="lobby-school" class="lobby-school"></div>
        </div>
      </div>
      <button class="btn-icon-header" onclick="AMathLobby.logout()">🚪</button>
    </header>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-games">0</div>
        <div class="stat-label">Games</div>
      </div>
      <div class="stat-card stat-win">
        <div class="stat-value" id="stat-wins">0</div>
        <div class="stat-label">Wins</div>
      </div>
      <div class="stat-card stat-loss">
        <div class="stat-value" id="stat-losses">0</div>
        <div class="stat-label">Losses</div>
      </div>
      <div class="stat-card stat-high">
        <div class="stat-value" id="stat-highscore">0</div>
        <div class="stat-label">High Score</div>
      </div>
    </div>

    <!-- Play Buttons -->
    <div class="play-section">
      <button class="btn-play" onclick="AMathLobby.playAI()">
        <span class="play-icon">🤖</span>
        <span>Play vs AI</span>
      </button>
      <button class="btn-play btn-play-2p" onclick="AMathLobby.playOnline()" disabled>
        <span class="play-icon">👥</span>
        <span>Play Online (Coming Soon)</span>
      </button>
    </div>

    <!-- Leaderboard -->
    <div class="leaderboard-section">
      <div class="lb-tabs">
        <button class="lb-tab active" onclick="AMathLobby.showLeaderboard('highScore')">🏆 High Score</button>
        <button class="lb-tab" onclick="AMathLobby.showLeaderboard('wins')">👑 Most Wins</button>
      </div>
      <div id="leaderboard-list" class="lb-list">
        <div class="lb-loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- PROFILE EDIT MODAL -->
  <!-- ============================================================ -->
  <div id="modal-profile" class="modal-overlay" style="display:none" onclick="AMathLobby.closeProfile(event)">
    <div class="modal-card" onclick="event.stopPropagation()">
      <h2>Edit Profile</h2>
      <div class="avatar-section">
        <div class="avatar-preview">
          <img id="edit-avatar-img" src="" alt="">
        </div>
        <label class="btn-upload" for="edit-avatar-upload">Change Photo</label>
        <input type="file" id="edit-avatar-upload" accept="image/*" style="display:none"
               onchange="AMathLobby.handleEditAvatar(event)">
      </div>
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="edit-display-name" maxlength="20">
      </div>
      <div class="form-group">
        <label>School</label>
        <input type="text" id="edit-school" maxlength="40">
      </div>
      <div class="modal-buttons">
        <button class="btn-primary" onclick="AMathLobby.updateProfile()">Save</button>
        <button class="btn-secondary" onclick="AMathLobby.closeProfile()">Cancel</button>
      </div>
      <div id="edit-error" class="error-msg"></div>
    </div>
  </div>

  <!-- Firebase SDK (compat — no bundler needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/lobby.js"></script>
</body>
</html>
