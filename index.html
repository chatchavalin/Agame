<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>A-Math</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <h1>A-Math</h1>
    <p id="status">Loading...</p>
    <div id="desktop-grid">
      <aside id="desktop-left-panel" class="desktop-side-panel">
        <div id="status-card" class="status-card">
          <div class="status-card-header">📢 Status</div>
          <div id="status-card-body" class="status-card-body">Loading...</div>
        </div>
        <div id="desktop-actions-slot"></div>
      </aside>
      <div id="game-container"></div>
      <aside id="desktop-right-panel" class="desktop-side-panel">
        <div class="side-panel-header">🔍 Tile Tracker</div>
        <div id="live-tile-tracker" class="side-panel-body"></div>
        <div class="side-panel-header">📋 Score Sheet</div>
        <div id="live-score-sheet" class="side-panel-body"></div>
      </aside>
    </div>
    <button id="debug-toggle">Show/Hide verification details</button>
    <div id="debug-output"></div>
  </div>

  <!-- Load scripts in dependency order -->
  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/evaluator.js"></script>
  <script src="js/bag.js"></script>
  <script src="js/rack.js"></script>
  <script src="js/board.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/placement.js"></script>
  <script src="js/ai-yoyo.js"></script>
  <script src="js/ai-x9.js"></script>
  <script src="js/ai-x4.js"></script>
  <script src="js/ai-patterns-data.js"></script>
  <script src="js/ai-patterns-engine.js"></script>
  <script src="js/ai-bingo-fast.js"></script>
  <script src="js/ai-bingo-grammar.js"></script>
  <script src="js/ai-swap.js"></script>
  <script src="js/ai-swap-brain2.js"></script>
  <script src="js/ai-player.js"></script>
  <script src="js/ai-worker-client.js"></script>
  <script src="js/sounds.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/modes.js"></script>
  <script src="js/trash-talk.js"></script>
  <script src="js/score-sheet.js"></script>
  <script src="js/save-resume.js"></script>
  <script src="js/challenge.js"></script>
  <script src="js/tile-tracker.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/interactions.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
