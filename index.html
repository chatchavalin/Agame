<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>A-Math</title>
  <!-- Cache-busting: bump ?v= when you ship changes so browsers fetch the
       new files instead of serving stale cached versions. -->
  <link rel="stylesheet" href="styles.css?v=v57-landscape">
</head>
<body>
  <div id="app">
    <h1>A-Math</h1>
    <p id="status">Loading...</p>
    <div id="desktop-grid">
      <aside id="desktop-left-panel" class="desktop-side-panel">
        <div id="status-card" class="status-card">
          <div class="status-card-header">📢 Status</div>
          <div id="status-card-body" class="status-card-body">Loading...</div>
        </div>
        <div id="desktop-actions-slot"></div>
      </aside>
      <div id="game-container"></div>
      <aside id="desktop-right-panel" class="desktop-side-panel">
        <div class="side-panel-header">🔍 Tile Tracker</div>
        <div id="live-tile-tracker" class="side-panel-body"></div>
        <div class="side-panel-header">📋 Score Sheet</div>
        <div id="live-score-sheet" class="side-panel-body"></div>
      </aside>
    </div>
  </div>

  <!-- Load scripts in dependency order -->
  <script src="js/constants.js?v=v200"></script>
  <script src="js/utils.js?v=v200"></script>
  <script src="js/evaluator.js?v=v200"></script>
  <script src="js/bag.js?v=v200"></script>
  <script src="js/rack.js?v=v200"></script>
  <script src="js/board.js?v=v200"></script>
  <script src="js/scoring.js?v=v200"></script>
  <script src="js/placement.js?v=v200"></script>
  <script src="js/ai-yoyo.js?v=v200"></script>
  <script src="js/ai-x9.js?v=v200"></script>
  <script src="js/ai-x4.js?v=v200"></script>
  <script src="js/ai-patterns-data.js?v=v200"></script>
  <script src="js/ai-patterns-engine.js?v=v200"></script>
  <script src="js/ai-bingo-fast.js?v=v200"></script>
  <script src="js/ai-bingo-grammar.js?v=v200"></script>
  <script src="js/ai-swap.js?v=v200"></script>
  <script src="js/ai-swap-brain2.js?v=v200"></script>
  <script src="js/ai-player.js?v=v200"></script>
  <script src="js/ai-worker-client.js?v=v200"></script>
  <script src="js/sounds.js?v=v200"></script>
  <script src="js/animations.js?v=v200"></script>
  <script src="js/settings.js?v=v200"></script>
  <script src="js/modes.js?v=v200"></script>
  <script src="js/trash-talk.js?v=v200"></script>
  <script src="js/score-sheet.js?v=v200"></script>
  <script src="js/save-resume.js?v=v200"></script>
  <script src="js/challenge.js?v=v200"></script>
  <script src="js/tile-tracker.js?v=v200"></script>
  <script src="js/education.js?v=v200"></script>
  <script src="js/puzzle-recorder.js?v=v200"></script>
  <script src="js/game-log.js?v=v200"></script>
  <script src="js/ui.js?v=v200"></script>
  <script src="js/interactions.js?v=v200"></script>
  <script src="js/main.js?v=v200"></script>
  <!-- Replay recorder + analysis export: load for ALL players (guests too) so
       "Send to Analysis" works without login. These don't need Firebase. -->
  <script src="js/replay-recorder.js?v=v200"></script>
  <script src="js/analysis-export.js?v=v200"></script>
  <!-- Firebase (optional — loads async, won't slow down game) -->
  <script>
  (function(){
    var params = new URLSearchParams(window.location.search);
    if (!params.get('userId') || params.get('userId') === 'guest') return; // skip Firebase for guest
    var scripts = [
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js',
      'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js'
    ];
    var loaded = 0;
    scripts.forEach(function(src){
      var s = document.createElement('script');
      s.src = src;
      s.async = false; // preserve order but non-blocking
      s.onload = function(){
        loaded++;
        if (loaded === scripts.length) {
          // All Firebase scripts loaded — init
          var s1 = document.createElement('script'); s1.src = 'js/firebase-config.js'; document.body.appendChild(s1);
          var sA = document.createElement('script'); sA.src = 'js/achievements.js'; document.body.appendChild(sA);
          var s2 = document.createElement('script'); s2.src = 'js/game-bridge.js?v=v61-saveexit'; document.body.appendChild(s2);
        }
      };
      document.body.appendChild(s);
    });
  })();
  </script>
</body>
</html>
