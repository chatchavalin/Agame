<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Math — Replay</title>
  <link rel="stylesheet" href="styles.css?v=20260525d">
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Outfit', sans-serif; }
    .replay-wrap { max-width: 900px; margin: 0 auto; padding: 12px; }
    .replay-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .replay-header img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .replay-meta { font-size: 12px; color: #94a3b8; }
    .replay-scores { display: flex; gap: 8px; margin: 10px 0; }
    .replay-score-box {
      flex: 1; background: #1e293b; padding: 10px; border-radius: 8px; text-align: center;
    }
    .replay-score-box.active { border: 2px solid #fbbf24; }
    .replay-score-value { font-size: 28px; font-weight: 700; color: #fbbf24; }
    .replay-score-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; }
    .replay-controls {
      display: flex; gap: 6px; justify-content: center; padding: 10px 0;
      position: sticky; bottom: 0; background: #0f172a;
    }
    .replay-btn {
      background: #1e293b; color: #e2e8f0; border: 1px solid #475569;
      padding: 8px 14px; border-radius: 6px; font-size: 14px; cursor: pointer;
      min-width: 44px;
    }
    .replay-btn:hover { background: #334155; }
    .replay-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .replay-btn-primary { background: #fbbf24; color: #1e293b; font-weight: 600; }
    .replay-step-info {
      background: #1e293b; padding: 8px 12px; border-radius: 6px; margin: 8px 0;
      font-size: 13px; min-height: 36px;
    }
    .replay-step-bingo { color: #fbbf24; font-weight: 600; }
    .replay-loading { text-align: center; padding: 40px; color: #94a3b8; }
    .amath-board-with-ruler { margin: 0 auto; }
    .replay-back { color: #94a3b8; text-decoration: none; font-size: 14px; }
    .replay-back:hover { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="replay-wrap">
    <a href="lobby.html" class="replay-back">← Back to lobby</a>
    <div id="replay-content" class="replay-loading">Loading replay...</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js?v=20260525d"></script>
  <script src="js/constants.js?v=20260525d"></script>
  <script src="js/utils.js?v=20260525d"></script>
  <script src="js/board.js?v=20260525d"></script>
  <script src="js/ui.js?v=20260525d"></script>
  <script src="js/replay-player.js?v=20260525d"></script>
</body>
</html>
