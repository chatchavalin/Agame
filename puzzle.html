<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Math — Puzzle Mode</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#fbbf24">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Outfit',sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }
    .puzzle-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; border-bottom:1px solid #1e293b;
    }
    .puzzle-header h1 { font-size:18px; font-weight:700; }
    .puzzle-header .back { background:none; border:none; color:#fbbf24; font-size:24px; cursor:pointer; }
    .puzzle-info {
      display:flex; justify-content:space-between; padding:12px 16px;
      background:#1e293b; font-size:13px;
    }
    .puzzle-info .badge { background:#fbbf24; color:#1f2937; padding:2px 10px; border-radius:99px; font-weight:700; }
    .puzzle-board-wrap { display:flex; justify-content:center; padding:8px; }
    .puzzle-board {
      display:grid; grid-template-columns:repeat(15,1fr);
      gap:1px; background:#334155; border:2px solid #475569; border-radius:4px;
      width:min(95vw, 450px); aspect-ratio:1;
    }
    .p-cell {
      background:#1e293b; display:flex; align-items:center; justify-content:center;
      font-size:min(2.8vw,13px); font-weight:700; color:#94a3b8; position:relative;
    }
    .p-cell.has-tile { background:#fef3c7; color:#1f2937; border:1px solid #d97706; }
    .p-cell.c3E { background:#dc2626; color:#fff; }
    .p-cell.c2E { background:#f472b6; color:#1f2937; }
    .p-cell.c3T { background:#7c3aed; color:#fff; }
    .p-cell.c2T { background:#6366f1; color:#fff; }
    .p-cell.star { background:#f59e0b; color:#1f2937; }
    .puzzle-rack-section { padding:12px 16px; text-align:center; }
    .puzzle-rack-section h3 { font-size:14px; color:#94a3b8; margin-bottom:8px; }
    .puzzle-rack {
      display:flex; justify-content:center; gap:4px;
    }
    .p-tile {
      width:40px; height:40px; background:#fef3c7; border:2px solid #d97706;
      border-radius:6px; display:flex; align-items:center; justify-content:center;
      font-size:16px; font-weight:800; color:#1f2937; position:relative;
    }
    .p-tile .pts { position:absolute; bottom:1px; right:3px; font-size:8px; font-weight:600; color:#78716c; }
    .puzzle-controls { padding:16px; display:flex; flex-direction:column; gap:10px; max-width:450px; margin:0 auto; }
    .btn-puzzle {
      padding:14px; border:none; border-radius:12px; font-size:16px; font-weight:700;
      cursor:pointer; font-family:'Outfit',sans-serif; width:100%;
    }
    .btn-reveal { background:#fbbf24; color:#1f2937; }
    .btn-next { background:#334155; color:#e2e8f0; }
    .btn-back { background:#1e293b; color:#94a3b8; border:1px solid #334155; }
    .answer-box {
      background:#1e293b; border-radius:12px; padding:16px; margin:0 16px;
      display:none; max-width:450px; margin:0 auto;
    }
    .answer-box.show { display:block; }
    .answer-box h3 { color:#fbbf24; font-size:16px; margin-bottom:8px; }
    .answer-play { font-size:14px; margin-bottom:6px; }
    .answer-score { font-size:22px; font-weight:800; color:#34d399; }
    .answer-eq { color:#94a3b8; font-size:13px; margin-top:4px; }
    .puzzle-type-select { padding:16px; max-width:450px; margin:0 auto; }
    .type-btn {
      display:block; width:100%; padding:18px 20px; margin-bottom:10px;
      background:#1e293b; border:1px solid #334155; border-radius:14px;
      color:#e2e8f0; font-size:16px; font-weight:600; text-align:left;
      cursor:pointer; font-family:'Outfit',sans-serif;
    }
    .type-btn:hover { border-color:#fbbf24; }
    .type-btn .emoji { font-size:24px; margin-right:12px; }
    .type-btn .desc { font-size:12px; color:#64748b; display:block; margin-top:4px; }
    .timer { font-size:14px; color:#fbbf24; font-weight:700; }
    .streak { font-size:14px; color:#34d399; }
  </style>
</head>
<body>

<div class="puzzle-header">
  <button class="back" onclick="goBack()">←</button>
  <h1>🧩 Puzzle Mode</h1>
  <div class="timer" id="timer">0:00</div>
</div>

<!-- TYPE SELECT -->
<div id="screen-select" class="puzzle-type-select">
  <button class="type-btn" onclick="startPuzzle('mixed')">
    <span class="emoji">🔥</span>Mixed Training
    <span class="desc">Bingo/YoYo/Cross 80% + High Score 20%</span>
  </button>
  <button class="type-btn" onclick="startPuzzle('bingo')">
    <span class="emoji">🎰</span>Bingo Only
    <span class="desc">ฝึกหา Bingo (8 เบี้ย)</span>
  </button>
  <button class="type-btn" onclick="startPuzzle('yoyo')">
    <span class="emoji">🪀</span>YoYo Only
    <span class="desc">ต่อสมการให้เต็มแถว 15 ช่อง</span>
  </button>
  <button class="type-btn" onclick="startPuzzle('cross')">
    <span class="emoji">✂️</span>Cross-Play
    <span class="desc">วางเบี้ยที่สร้างสมการทั้งแนวนอนและแนวตั้ง — Advanced!</span>
  </button>
  <button class="type-btn" onclick="goBack()">
    <span class="emoji">🏠</span>Back to Lobby
  </button>
</div>

<!-- PUZZLE VIEW -->
<div id="screen-puzzle" style="display:none">
  <div class="puzzle-info">
    <span id="puzzle-type-label">Best Play</span>
    <span class="streak" id="streak">Streak: 0</span>
    <span class="badge" id="puzzle-num">#1</span>
  </div>
  <div class="puzzle-board-wrap">
    <div class="puzzle-board" id="puzzle-board"></div>
  </div>
  <div class="puzzle-rack-section">
    <h3>Your Rack</h3>
    <div class="puzzle-rack" id="puzzle-rack"></div>
    <div id="puzzle-hint" style="color:#64748b;font-size:12px;margin-top:8px;"></div>
  </div>
  <div class="answer-box" id="answer-box">
    <h3>💡 Top Plays</h3>
    <div id="answer-buttons" style="display:flex;gap:6px;margin-bottom:10px;"></div>
    <div id="answer-detail"></div>
  </div>
  <div class="puzzle-controls">
    <button class="btn-puzzle btn-reveal" id="btn-reveal" onclick="revealAnswer()">👁️ Show Answer</button>
    <button class="btn-puzzle btn-next" onclick="nextPuzzle()">Next Puzzle →</button>
    <button class="btn-puzzle btn-back" onclick="showSelect()">← Change Type</button>
  </div>
</div>

<!-- Load game engine (needed for board, scoring, AI search) -->
<script src="js/constants.js?v=20260525c"></script>
<script src="js/utils.js?v=20260525c"></script>
<script src="js/board.js?v=20260525c"></script>

<script>
(function() {
  var Board, Bag, Rack, C, Placement, Scoring;
  var currentPuzzle = null;
  var puzzleType = 'best';
  var puzzleNum = 0;
  var streak = 0;
  var timerInterval = null;
  var timerSeconds = 0;
  var answerRevealed = false;

  function init() {
    Board = window.AMath.board;
    Bag = window.AMath.bag;
    Rack = window.AMath.rack;
    C = window.AMath.constants;
    Placement = window.AMath.placement;
    Scoring = window.AMath.scoring;
  }

  // Premium square map
  var PREMIUMS = {};
  var pList = [
    // 3E (red corners + center cross)
    [0,0,'3E'],[0,7,'3E'],[0,14,'3E'],[7,0,'3E'],[7,14,'3E'],[14,0,'3E'],[14,7,'3E'],[14,14,'3E'],
    // 2E
    [1,1,'2E'],[1,13,'2E'],[2,2,'2E'],[2,12,'2E'],[3,3,'2E'],[3,11,'2E'],[4,4,'2E'],[4,10,'2E'],
    [10,4,'2E'],[10,10,'2E'],[11,3,'2E'],[11,11,'2E'],[12,2,'2E'],[12,12,'2E'],[13,1,'2E'],[13,13,'2E'],
    // 3T
    [1,5,'3T'],[1,9,'3T'],[5,1,'3T'],[5,5,'3T'],[5,9,'3T'],[5,13,'3T'],
    [9,1,'3T'],[9,5,'3T'],[9,9,'3T'],[9,13,'3T'],[13,5,'3T'],[13,9,'3T'],
    // 2T
    [0,3,'2T'],[0,11,'2T'],[3,0,'2T'],[3,6,'2T'],[3,8,'2T'],[3,14,'2T'],
    [6,2,'2T'],[6,6,'2T'],[6,8,'2T'],[6,12,'2T'],
    [7,3,'2T'],[7,11,'2T'],
    [8,2,'2T'],[8,6,'2T'],[8,8,'2T'],[8,12,'2T'],
    [11,0,'2T'],[11,6,'2T'],[11,8,'2T'],[11,14,'2T'],
    [14,3,'2T'],[14,11,'2T'],
  ];
  pList.forEach(function(p){ PREMIUMS[p[0]+','+p[1]] = p[2]; });

  function renderBoard(board) {
    var grid = document.getElementById('puzzle-board');
    grid.innerHTML = '';
    for (var r = 0; r < 15; r++) {
      for (var c = 0; c < 15; c++) {
        var cell = document.createElement('div');
        cell.className = 'p-cell';
        var tile = board.cells[r][c].tile;
        if (tile) {
          cell.classList.add('has-tile');
          cell.textContent = tile.assigned || tile.face;
        } else {
          var key = r+','+c;
          if (r===7 && c===7) { cell.classList.add('star'); cell.textContent='★'; }
          else if (PREMIUMS[key]) {
            cell.classList.add('c'+PREMIUMS[key]);
            cell.textContent = PREMIUMS[key];
          }
        }
        grid.appendChild(cell);
      }
    }
  }

  function renderRack(tiles) {
    var rack = document.getElementById('puzzle-rack');
    rack.innerHTML = '';
    tiles.forEach(function(t) {
      var div = document.createElement('div');
      div.className = 'p-tile';
      div.textContent = t.face === 'BLANK' ? '?' : t.face;
      var pts = document.createElement('span');
      pts.className = 'pts';
      pts.textContent = t.points;
      div.appendChild(pts);
      rack.appendChild(div);
    });
  }

  // Pre-built puzzle banks — each has a guaranteed solution
  var PUZZLE_BANK = {
    bingo: [
      { board: [
          [7,5,'2'],[7,6,'+'],[7,7,'5'],[7,8,'='],[7,9,'7'],
          [5,7,'1'],[6,7,'+'],[8,7,'-'],[9,7,'2'],[10,7,'='],[11,7,'4'],
          [9,5,'8'],[9,6,'-'],[9,8,'='],[9,9,'6'],
          [11,5,'3'],[11,6,'+'],[11,8,'-'],[11,9,'1'],[11,10,'='],[11,11,'6'],
        ], rack: ['4','+','3','+','=','8','=','6'], hint: 'Extend row 5 through the 1' },
      { board: [
          [7,4,'9'],[7,5,'-'],[7,6,'4'],[7,7,'='],[7,8,'5'],
          [5,7,'8'],[6,7,'-'],[8,7,'+'],[9,7,'3'],[10,7,'='],[11,7,'8'],
          [9,5,'1'],[9,6,'+'],[9,8,'='],[9,9,'4'],
          [5,5,'6'],[5,6,'+'],[5,8,'='],[5,9,'10'],
          [11,5,'3'],[11,6,'+'],[11,8,'-'],[11,9,'2'],[11,10,'='],[11,11,'6'],
        ], rack: ['7','-','2','=','5','=','3','+'], hint: 'Build on row 3 or row 13' },
      { board: [
          [7,5,'6'],[7,6,'='],[7,7,'3'],[7,8,'+'],[7,9,'3'],
          [5,7,'9'],[6,7,'-'],[8,7,'='],[9,7,'1'],[10,7,'+'],[11,7,'2'],
          [9,5,'4'],[9,6,'-'],[9,8,'='],[9,9,'3'],
          [5,5,'3'],[5,6,'+'],[5,8,'='],[5,9,'12'],
          [11,5,'7'],[11,6,'-'],[11,8,'='],[11,9,'1'],[11,10,'+'],[11,11,'2'],
        ], rack: ['5','+','4','-','1','=','8','='], hint: 'Find the column with space for 8 tiles' },
      { board: [
          [7,4,'1'],[7,5,'+'],[7,6,'4'],[7,7,'='],[7,8,'5'],
          [5,7,'3'],[6,7,'+'],[8,7,'-'],[9,7,'2'],[10,7,'='],[11,7,'3'],
          [5,5,'1'],[5,6,'+'],[5,8,'='],[5,9,'6'],
          [9,4,'8'],[9,5,'-'],[9,6,'4'],[9,8,'='],[9,9,'6'],
          [3,7,'7'],[4,7,'-'],
          [11,5,'9'],[11,6,'-'],[11,8,'='],[11,9,'2'],[11,10,'-'],[11,11,'1'],
        ], rack: ['2','+','6','=','3','+','5','='], hint: 'Look for 8-tile space on open rows' },
    ],
    yoyo: [
      { line: 'row', idx: 7, tiles: [[2,'3'],[3,'+'],[4,'4'],[5,'-'],[6,'2'],[7,'+'],[8,'1'],[9,'='],[10,'6'],[11,'='],[12,'5'],[13,'+'],[14,'1']], rack: ['0','+'], hint: 'Start with 0+' },
      { line: 'row', idx: 7, tiles: [[0,'1'],[1,'+'],[2,'3'],[3,'='],[4,'4'],[5,'='],[6,'2'],[7,'+'],[9,'='],[10,'5'],[11,'='],[12,'4'],[13,'+'],[14,'1']], rack: ['2'], hint: 'Single tile!' },
      { line: 'row', idx: 0, tiles: [[0,'8'],[1,'-'],[2,'3'],[3,'='],[4,'5'],[5,'='],[6,'4'],[7,'+'],[8,'1'],[9,'='],[10,'7'],[11,'-'],[12,'2']], rack: ['=','5'], hint: 'Complete both ends' },
      { line: 'col', idx: 7, tiles: [[2,'3'],[3,'+'],[4,'4'],[5,'-'],[6,'2'],[7,'='],[8,'5'],[9,'='],[10,'4'],[11,'+'],[12,'1'],[13,'='],[14,'5']], rack: ['0','+'], hint: 'Vertical 0+' },
      { line: 'row', idx: 14, tiles: [[1,'9'],[2,'-'],[3,'4'],[4,'='],[5,'5'],[6,'='],[7,'3'],[8,'+'],[9,'2'],[10,'='],[11,'1'],[12,'+'],[13,'4']], rack: ['=','5'], hint: 'Fill both edges' },
      { line: 'row', idx: 7, tiles: [[2,'7'],[3,'-'],[4,'2'],[5,'='],[6,'5'],[7,'='],[8,'3'],[9,'+'],[10,'2'],[11,'='],[12,'4'],[13,'+'],[14,'1']], rack: ['0','+'], hint: 'Prefix 0+' },
    ],
    cross: [
      { board: [
          [7,5,'4'],[7,6,'+'],[7,8,'='],[7,9,'7'],
          [5,7,'1'],[6,7,'+'],[8,7,'='],[9,7,'4'],
          [9,5,'8'],[9,6,'-'],[9,8,'='],[9,9,'2'],
          [5,5,'3'],[5,6,'+'],[5,8,'='],[5,9,'4'],
        ], rack: ['3','5','=','8','-','2','+','6'], hint: '1 tile at center creates 2 equations' },
      { board: [
          [7,5,'8'],[7,6,'-'],[7,8,'='],[7,9,'3'],
          [5,7,'2'],[6,7,'+'],[8,7,'='],[9,7,'7'],
          [9,5,'1'],[9,6,'+'],[9,8,'='],[9,9,'8'],
          [5,5,'6'],[5,6,'-'],[5,8,'='],[5,9,'1'],
          [11,7,'+'],[12,7,'2'],[13,7,'='],[13,5,'3'],[13,6,'+'],
        ], rack: ['5','4','=','1','+','6','-','3'], hint: 'Cross at center + extend down' },
      { board: [
          [7,4,'9'],[7,5,'-'],[7,7,'='],[7,8,'7'],
          [5,6,'4'],[6,6,'+'],[8,6,'='],[9,6,'6'],
          [5,8,'3'],[6,8,'+'],[8,8,'-'],[9,8,'2'],[10,8,'='],[11,8,'5'],
          [9,4,'1'],[9,5,'+'],
          [3,6,'8'],[4,6,'-'],
        ], rack: ['2','3','=','8','+','1','-','5'], hint: 'Double cross at col 6 and col 8' },
      { board: [
          [7,3,'1'],[7,4,'+'],[7,5,'2'],[7,6,'='],[7,7,'3'],
          [5,7,'7'],[6,7,'-'],[8,7,'='],[9,7,'1'],
          [5,5,'3'],[5,6,'+'],[5,8,'='],[5,9,'10'],
          [9,5,'4'],[9,6,'-'],[9,8,'='],[9,9,'2'],
          [3,7,'='],[2,7,'7'],
          [11,5,'6'],[11,6,'+'],[11,7,'1'],[11,8,'='],[11,9,'7'],
        ], rack: ['3','=','6','-','3','=','8','+'], hint: 'Multiple anchors — maximize score' },
      { board: [
          [7,5,'5'],[7,6,'+'],[7,7,'4'],[7,8,'='],[7,9,'9'],
          [5,7,'8'],[6,7,'-'],
          [8,7,'+'],[9,7,'1'],[10,7,'='],[11,7,'5'],
          [5,5,'2'],[5,6,'+'],[5,8,'='],[5,9,'12'],
          [9,5,'3'],[9,6,'-'],[9,8,'='],[9,9,'2'],
          [11,5,'9'],[11,6,'-'],[11,8,'+'],[11,9,'1'],[11,10,'='],[11,11,'6'],
        ], rack: ['4','2','=','6','+','3','-','1'], hint: 'Hit 2T or 3T premium' },
      { board: [
          [7,4,'3'],[7,5,'+'],[7,6,'4'],[7,7,'='],[7,8,'7'],
          [5,7,'1'],[6,7,'+'],
          [8,7,'-'],[9,7,'3'],[10,7,'='],[11,7,'4'],
          [9,5,'8'],[9,6,'-'],[9,8,'='],[9,9,'5'],
          [5,5,'6'],[5,6,'-'],[5,8,'='],[5,9,'6'],
          [3,7,'='],[2,7,'1'],
          [11,5,'1'],[11,6,'+'],[11,8,'='],[11,9,'5'],
          [13,7,'+'],[13,8,'1'],[13,9,'='],[13,10,'5'],
        ], rack: ['6','-','2','=','4','=','3','+'], hint: '3+ cross points available' },
    ],
  };

  function generatePuzzle(type) {
    if (!Board) init();
    var inv = C.getActiveInventory();
    function mk(f) {
      var d = inv.find(function(x){return x.face===f}) || {type:'digit',points:1};
      return {id:'p'+Math.random(), face:f, type:d.type, points:d.points, assigned:null};
    }

    // Mixed mode: 35% bingo, 35% yoyo, 30% cross
    var actualType = type;
    if (type === 'mixed') {
      var roll = Math.random();
      if (roll < 0.35) actualType = 'bingo';
      else if (roll < 0.70) actualType = 'yoyo';
      else actualType = 'cross';
    }

    var bank = PUZZLE_BANK[actualType] || PUZZLE_BANK.cross;
    var template = bank[Math.floor(Math.random() * bank.length)];
    var board = Board.createBoard();

    if (type === 'yoyo') {
      // Place tiles on the specified line
      for (var i = 0; i < template.tiles.length; i++) {
        var pos = template.tiles[i][0];
        var face = template.tiles[i][1];
        if (template.line === 'row') {
          Board.placeTile(board, template.idx, pos, mk(face));
        } else {
          Board.placeTile(board, pos, template.idx, mk(face));
        }
      }
    } else {
      // Place board tiles
      for (var j = 0; j < template.board.length; j++) {
        var r = template.board[j][0], c = template.board[j][1], f = template.board[j][2];
        Board.placeTile(board, r, c, mk(f));
      }
    }

    // Build rack
    var rackTiles = template.rack.map(function(f) { return mk(f); });

    return { board: board, rack: rackTiles, bag: {tiles:[]}, hint: template.hint };
  }

  function findBestPlays(board, rackTiles, maxResults) {
    var results = []; // {score, placements, equations, bingo}
    var seen = {}; // dedup by position key
    var anchors = [];

    for (var r = 0; r < 15; r++) {
      for (var c = 0; c < 15; c++) {
        if (board.cells[r][c].tile) continue;
        var adj = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
        for (var a = 0; a < adj.length; a++) {
          var ar = adj[a][0], ac = adj[a][1];
          if (ar>=0 && ar<15 && ac>=0 && ac<15 && board.cells[ar][ac].tile) {
            anchors.push({row:r, col:c});
            break;
          }
        }
      }
    }

    var boardEmpty = anchors.length === 0;
    if (boardEmpty) anchors = [{row:7, col:7}];

    var maxLen = Math.min(rackTiles.length, 8);
    var timeLimit = Date.now() + 8000;

    for (var ai = 0; ai < anchors.length && Date.now() < timeLimit; ai++) {
      var anchor = anchors[ai];
      for (var len = 2; len <= maxLen && Date.now() < timeLimit; len++) {
        for (var sc = Math.max(0, anchor.col-len+1); sc <= anchor.col && sc+len-1 < 15; sc++) {
          tryPlace(board, rackTiles, anchor.row, sc, len, 'h', boardEmpty);
        }
        for (var sr = Math.max(0, anchor.row-len+1); sr <= anchor.row && sr+len-1 < 15; sr++) {
          tryPlace(board, rackTiles, sr, anchor.col, len, 'v', boardEmpty);
        }
      }
    }

    function tryPlace(board, tiles, startR, startC, len, dir, isFirst) {
      var emptyCells = [];
      for (var i = 0; i < len; i++) {
        var r = dir==='h' ? startR : startR+i;
        var c = dir==='h' ? startC+i : startC;
        if (r>=15 || c>=15) return;
        if (!board.cells[r][c].tile) emptyCells.push({row:r, col:c});
      }
      if (emptyCells.length === 0 || emptyCells.length > tiles.length) return;

      var perms = getSimplePerms(tiles, emptyCells.length, 100);
      for (var p = 0; p < perms.length && Date.now() < timeLimit; p++) {
        var perm = perms[p];
        var placements = [];
        for (var e = 0; e < emptyCells.length; e++) {
          Board.placeTile(board, emptyCells[e].row, emptyCells[e].col, perm[e]);
          placements.push({row:emptyCells[e].row, col:emptyCells[e].col, tile:perm[e]});
        }
        var result = Placement.validatePlay(board, placements, isFirst);
        if (result.ok) {
          var score = Scoring.scorePlay(result.equations, board, placements.length);
          var key = placements.map(function(p){return p.row+','+p.col+':'+p.tile.face;}).sort().join('|');
          if (!seen[key]) {
            seen[key] = true;
            results.push({
              score: score.total,
              placements: placements.map(function(p){return{row:p.row,col:p.col,face:p.tile.assigned||p.tile.face};}),
              bingo: placements.length >= 8,
              tilesUsed: placements.length,
            });
          }
        }
        for (var e2 = 0; e2 < emptyCells.length; e2++) {
          Board.removeTile(board, emptyCells[e2].row, emptyCells[e2].col);
        }
      }
    }

    function getSimplePerms(arr, k, limit) {
      var res = [];
      function helper(remaining, chosen) {
        if (res.length >= limit) return;
        if (chosen.length === k) { res.push(chosen.slice()); return; }
        for (var i = 0; i < remaining.length; i++) {
          if (i > 0 && remaining[i].face === remaining[i-1].face && remaining[i].type === remaining[i-1].type) continue;
          chosen.push(remaining[i]);
          helper(remaining.slice(0,i).concat(remaining.slice(i+1)), chosen);
          chosen.pop();
        }
      }
      helper(arr, []);
      return res;
    }

    results.sort(function(a,b){ return b.score - a.score; });
    return results.slice(0, maxResults || 3);
  }

  // === PUBLIC API ===

  window.startPuzzle = function(type) {
    try {
      if (!Board) init();
    } catch(e) {
      document.getElementById('screen-select').innerHTML += '<div style="color:red;padding:16px">Error: ' + e.message + '</div>';
      return;
    }
    puzzleType = type;
    puzzleNum = 0;
    streak = 0;
    document.getElementById('screen-select').style.display = 'none';
    document.getElementById('screen-puzzle').style.display = 'block';
    var labels = {mixed:'🔥 Mixed', best:'💎 High Score', bingo:'🎰 Bingo', yoyo:'🪀 YoYo', cross:'✂️ Cross-Play'};
    document.getElementById('puzzle-type-label').textContent = labels[type] || type;
    nextPuzzle();
  };

  window.nextPuzzle = function() {
    try {
      if (!Board) init();
    } catch(e) {
      document.getElementById('puzzle-rack').innerHTML = '<div style="color:red">Init error: ' + e.message + '</div>';
      return;
    }
    puzzleNum++;
    answerRevealed = false;
    document.getElementById('puzzle-num').textContent = '#' + puzzleNum;
    document.getElementById('streak').textContent = 'Streak: ' + streak;
    document.getElementById('answer-box').classList.remove('show');
    document.getElementById('btn-reveal').textContent = '👁️ Show Answer';
    document.getElementById('btn-reveal').disabled = false;

    // Generate puzzle
    try {
      var puzzle = generatePuzzle(puzzleType);
      currentPuzzle = puzzle;
      renderBoard(puzzle.board);
      renderRack(puzzle.rack);
      document.getElementById('puzzle-hint').textContent = puzzle.hint ? '💡 Hint: ' + puzzle.hint : '';
    } catch(e) {
      document.getElementById('puzzle-rack').innerHTML = '<div style="color:red">Puzzle error: ' + e.message + '</div>';
      return;
    }

    // Find answer in background
    currentPuzzle.answer = null;
    document.getElementById('btn-reveal').textContent = '⏳ Searching...';
    setTimeout(function() {
      currentPuzzle.answer = findBestPlays(puzzle.board, puzzle.rack, 3);
      if (!answerRevealed) {
        document.getElementById('btn-reveal').textContent = '👁️ Show Answer (' + (currentPuzzle.answer.length) + ' plays found)';
      }
    }, 100);

    // Start timer
    timerSeconds = 0;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      timerSeconds++;
      var m = Math.floor(timerSeconds/60);
      var s = timerSeconds % 60;
      document.getElementById('timer').textContent = m + ':' + (s<10?'0':'') + s;
    }, 1000);
  };

  var savedBoard = null; // store board HTML before highlighting

  window.revealAnswer = function() {
    answerRevealed = true;
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    var box = document.getElementById('answer-box');
    var answers = currentPuzzle ? currentPuzzle.answer : [];

    // Save board state for toggling
    savedBoard = document.getElementById('puzzle-board').innerHTML;

    if (!answers || answers.length === 0) {
      document.getElementById('answer-buttons').innerHTML = '';
      document.getElementById('answer-detail').innerHTML = '<div style="color:#f87171">No valid play found. Try next puzzle!</div>';
    } else {
      var colors = ['#34d399','#fbbf24','#94a3b8'];
      var medals = ['🥇','🥈','🥉'];
      var btnsHtml = '';
      for (var i = 0; i < answers.length; i++) {
        var a = answers[i];
        var label = medals[i] + ' ' + a.score + 'pts';
        if (a.bingo) label += ' 🎉';
        btnsHtml += '<button onclick="showPlay('+i+')" style="flex:1;padding:10px 6px;border:2px solid '+colors[i]+';background:#0f172a;color:'+colors[i]+';border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:Outfit,sans-serif" id="ans-btn-'+i+'">' + label + '</button>';
      }
      document.getElementById('answer-buttons').innerHTML = btnsHtml;
      document.getElementById('answer-detail').innerHTML = '';
      // Auto-show #1
      showPlay(0);
    }
    box.classList.add('show');
    document.getElementById('btn-reveal').textContent = '✅ Revealed';
    document.getElementById('btn-reveal').disabled = true;
  };

  window.showPlay = function(idx) {
    var answers = currentPuzzle ? currentPuzzle.answer : [];
    if (!answers || idx >= answers.length) return;
    var a = answers[idx];
    var colors = ['#34d399','#fbbf24','#94a3b8'];

    // Reset board to saved state
    document.getElementById('puzzle-board').innerHTML = savedBoard;

    // Highlight selected play on board
    a.placements.forEach(function(p) {
      var cellIdx = p.row * 15 + p.col;
      var cells = document.getElementById('puzzle-board').children;
      if (cells[cellIdx]) {
        cells[cellIdx].style.background = colors[idx];
        cells[cellIdx].style.color = '#1f2937';
        cells[cellIdx].style.fontWeight = '800';
        cells[cellIdx].style.fontSize = 'min(3.5vw,15px)';
        cells[cellIdx].textContent = p.face;
      }
    });

    // Update active button style
    for (var b = 0; b < answers.length; b++) {
      var btn = document.getElementById('ans-btn-'+b);
      if (btn) btn.style.opacity = b === idx ? '1' : '0.4';
    }

    // Show detail
    var positions = a.placements.map(function(p){return p.face;}).join(' ');
    var tilesText = a.tilesUsed + ' tiles' + (a.bingo ? ' — BINGO! 🎉' : '');
    document.getElementById('answer-detail').innerHTML =
      '<div style="text-align:center;margin-top:8px">' +
      '<div style="font-size:24px;font-weight:800;color:'+colors[idx]+'">' + a.score + ' points</div>' +
      '<div style="font-size:14px;color:#e2e8f0;margin-top:4px">' + positions + '</div>' +
      '<div style="font-size:12px;color:#64748b;margin-top:2px">' + tilesText + '</div>' +
      '</div>';
  };

  window.showSelect = function() {
    document.getElementById('screen-select').style.display = 'block';
    document.getElementById('screen-puzzle').style.display = 'none';
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  };

  window.goBack = function() {
    var params = new URLSearchParams(window.location.search);
    if (params.get('from') === 'lobby') {
      window.location.href = 'lobby.html';
    } else {
      window.location.href = 'lobby.html';
    }
  };
})();
</script>
