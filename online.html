<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Math — Online Room</title>
  <link rel="stylesheet" href="styles.css?v=20260526h">
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Outfit', sans-serif; }
    /* The outer room-wrap is the waiting-room shell. Once a game starts the
       PvA-style layout takes over inside #room-content, which is wrapped by
       #app to inherit the PvA edge-to-edge board sizing rules. Wrap no longer
       caps width so #app can claim full screen width on mobile/tablet. */
    .room-wrap { margin: 0 auto; padding: 14px 0 0 0; }
    .room-header, .players-row, .room-status { padding: 0 14px; max-width: 900px; margin-left: auto; margin-right: auto; }
    /* When the game has started, #room-content holds the PvA layout —
       remove side padding so the board can claim full screen width on
       mobile (matches PvA which has zero side padding on small screens). */
    #room-content { padding: 0; margin: 0; }
    .room-header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; margin-bottom: 12px;
      flex-wrap: wrap;  /* on narrow phones, code drops to its own row */
    }
    .room-header-tools {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .room-header-tool-btn {
      background: #334155; color: #e2e8f0; border: none;
      padding: 8px 12px; border-radius: 6px; cursor: pointer;
      font-size: 16px; line-height: 1;
      min-width: 40px; min-height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .room-header-tool-btn:active { background: #475569; }
    .room-code-display {
      background: #1e293b; padding: 8px 14px; border-radius: 8px;
      border: 2px dashed #fbbf24;
      font-family: monospace; font-size: 20px; font-weight: 700;
      letter-spacing: 4px; color: #fbbf24; cursor: pointer;
    }
    .room-code-display:hover { background: #334155; }
    .room-back { color: #94a3b8; text-decoration: none; font-size: 14px; }
    .room-back:hover { color: #fbbf24; }
    .room-status {
      background: #1e293b; padding: 14px; border-radius: 8px;
      margin: 10px 0; text-align: center;
    }
    .room-status.waiting { border: 1px solid #fbbf24; }
    .room-status.playing { border: 1px solid #86efac; }
    .room-status.finished { border: 1px solid #93c5fd; }
    .players-row { display: flex; gap: 10px; margin: 12px 0; }
    .player-card {
      flex: 1; background: #1e293b; padding: 10px; border-radius: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .player-card.active { border: 2px solid #fbbf24; }
    .player-card img { width: 36px; height: 36px; border-radius: 50%; }
    .player-card .pname { font-weight: 600; }
    .player-card .pscore { font-size: 24px; color: #fbbf24; font-weight: 700; }
    .mvp-warning {
      background: #422006; color: #fbbf24; padding: 10px; border-radius: 6px;
      font-size: 13px; margin: 12px 0; border: 1px solid #92400e;
    }
    .copy-feedback {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: #16a34a; color: white; padding: 8px 14px; border-radius: 6px;
      z-index: 99999; opacity: 0; transition: opacity .3s;
    }
    .copy-feedback.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="room-wrap">
    <div class="room-header">
      <a href="lobby.html" class="room-back">← Leave room</a>
      <div class="room-header-tools">
        <!-- Mid-game access to PvA-style modules brought into online PvP -->
        <button id="online-btn-sheet" type="button" class="room-header-tool-btn"
                title="Score sheet" aria-label="Score sheet">📊</button>
        <button id="online-btn-log" type="button" class="room-header-tool-btn"
                title="Game log" aria-label="Game log">📜</button>
        <button id="online-btn-settings" type="button" class="room-header-tool-btn"
                title="Settings" aria-label="Settings">⚙️</button>
      </div>
      <div class="room-code-display" id="room-code"
           onclick="copyRoomCode()" role="button" tabindex="0">…</div>
    </div>

    <!-- Player cards & MVP warning hidden when the game is in progress -
         the PvA-style layout below shows player names + scores natively.
         These cards are still rendered (for the waiting screen) but hidden
         while playing. -->
    <div class="players-row" id="players-row">
      <div class="player-card" id="host-card">
        <div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>
        <div>
          <div class="pname">…</div>
          <div style="font-size:11px;color:#94a3b8;">Host</div>
        </div>
        <div class="pscore" style="margin-left:auto;">0</div>
      </div>
      <div class="player-card" id="guest-card">
        <div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>
        <div>
          <div class="pname">Waiting…</div>
          <div style="font-size:11px;color:#94a3b8;">Guest</div>
        </div>
        <div class="pscore" style="margin-left:auto;">0</div>
      </div>
    </div>

    <div class="room-status waiting" id="room-status">Loading…</div>

    <!-- #app wrapper matches PvA's index.html so the .amath-app layout
         inside renders with the same cell-size variables and full screen
         width on mobile. -->
    <div id="app">
      <div id="room-content"></div>
    </div>
  </div>

  <div id="copy-feedback" class="copy-feedback">Copied to clipboard!</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js?v=20260526h"></script>
  <!-- Game-core modules required by the online controller -->
  <script src="js/constants.js?v=20260526h"></script>
  <script src="js/utils.js?v=20260526h"></script>
  <script src="js/evaluator.js?v=20260526h"></script>
  <script src="js/bag.js?v=20260526h"></script>
  <script src="js/rack.js?v=20260526h"></script>
  <script src="js/board.js?v=20260526h"></script>
  <script src="js/scoring.js?v=20260526h"></script>
  <script src="js/placement.js?v=20260526h"></script>
  <script src="js/ui.js?v=20260526h"></script>
  <script src="js/online-room.js?v=20260526h"></script>
  <script src="js/game-bridge.js?v=20260526h"></script>
  <!-- PvA feature modules brought into online PvP per user request: timer
       skipped, education off, trash-talk skipped. Everything else loaded
       so online has settings (themes), sounds, animations, game log, tile
       tracker, score sheet, and challenge module. -->
  <script src="js/settings.js?v=20260526h"></script>
  <script src="js/sounds.js?v=20260526h"></script>
  <script src="js/animations.js?v=20260526h"></script>
  <script src="js/game-log.js?v=20260526h"></script>
  <script src="js/tile-tracker.js?v=20260526h"></script>
  <script src="js/score-sheet.js?v=20260526h"></script>
  <script src="js/challenge.js?v=20260526h"></script>
  <script src="js/online-game.js?v=20260526h"></script>
  <script>
    var roomCode = new URLSearchParams(window.location.search).get('room');
    var role = new URLSearchParams(window.location.search).get('role');

    function copyRoomCode() {
      if (!roomCode) return;
      navigator.clipboard.writeText(roomCode).then(function () {
        var fb = document.getElementById('copy-feedback');
        fb.classList.add('show');
        setTimeout(function () { fb.classList.remove('show'); }, 1500);
      });
    }

    function renderHeader(data) {
      document.getElementById('room-code').textContent = roomCode || '???';

      var hostCard = document.getElementById('host-card');
      hostCard.innerHTML =
        (data.hostPhoto
          ? '<img src="' + data.hostPhoto + '" alt="">'
          : '<div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>') +
        '<div><div class="pname">' + escapeHtml(data.hostName || 'Host') + '</div>' +
        '<div style="font-size:11px;color:#94a3b8;">Host' +
        (role === 'host' ? ' · you' : '') + '</div></div>' +
        '<div class="pscore" style="margin-left:auto;">' + (data.hostScore || 0) + '</div>';

      var guestCard = document.getElementById('guest-card');
      if (data.guestUid) {
        guestCard.innerHTML =
          (data.guestPhoto
            ? '<img src="' + data.guestPhoto + '" alt="">'
            : '<div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>') +
          '<div><div class="pname">' + escapeHtml(data.guestName || 'Guest') + '</div>' +
          '<div style="font-size:11px;color:#94a3b8;">Guest' +
          (role === 'guest' ? ' · you' : '') + '</div></div>' +
          '<div class="pscore" style="margin-left:auto;">' + (data.guestScore || 0) + '</div>';
      } else {
        guestCard.innerHTML =
          '<div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>' +
          '<div><div class="pname" style="color:#64748b;">Waiting…</div>' +
          '<div style="font-size:11px;color:#94a3b8;">Guest</div></div>';
      }

      if (data.status === 'playing' && data.turn) {
        hostCard.classList.toggle('active', data.turn === 'host');
        guestCard.classList.toggle('active', data.turn === 'guest');
      }

      var statusEl = document.getElementById('room-status');
      statusEl.classList.remove('waiting', 'playing', 'finished');
      if (data.status === 'waiting') {
        statusEl.classList.add('waiting');
        statusEl.innerHTML = role === 'host'
          ? '⏳ Waiting for a guest to join with code <b>' + roomCode + '</b>.<br>' +
            '<span style="font-size:12px;color:#94a3b8;">Tap the code at the top to copy.</span>'
          : '⏳ Joined! Waiting for game to start…';
      } else if (data.status === 'playing') {
        statusEl.classList.add('playing');
        statusEl.innerHTML = data.turn === role
          ? '✅ Your turn — make a move'
          : '⏱️ Opponent thinking…';
      } else if (data.status === 'finished') {
        statusEl.classList.add('finished');
        var winnerName = data.winner === 'host' ? data.hostName
                       : data.winner === 'guest' ? data.guestName : 'Tie';
        statusEl.innerHTML = '🏁 Game over — ' + escapeHtml(winnerName);
      }
    }

    // online-game.js calls this via window.AMathOnlineHeader (defined below)
    window.AMathOnlineHeader = { render: renderHeader };

    // Wire the header utility buttons (score sheet / game log / settings).
    // These are visible throughout the game so users can check progress
    // or open settings at any point.
    //
    // CRITICAL: wire IMMEDIATELY rather than inside DOMContentLoaded —
    // this inline script runs at end-of-body after all the elements
    // already exist, AND by this point DOMContentLoaded may have already
    // fired (especially if any earlier <script> blocked parsing). A
    // listener attached after DOMContentLoaded fires never runs.
    (function wireHeaderButtons() {
      var sheetBtn = document.getElementById('online-btn-sheet');
      if (sheetBtn) {
        sheetBtn.addEventListener('click', function (ev) {
          ev.preventDefault();
          var og = window.AMath && window.AMath.onlineGame;
          var role = og && og.getRole && og.getRole();
          var data = og && og.getRoomData && og.getRoomData();
          var myScore = 0, oppScore = 0;
          if (data) {
            myScore = role === 'host' ? (data.hostScore || 0) : (data.guestScore || 0);
            oppScore = role === 'host' ? (data.guestScore || 0) : (data.hostScore || 0);
          }
          if (window.AMath && window.AMath.scoreSheet && window.AMath.scoreSheet.showPopup) {
            window.AMath.scoreSheet.showPopup(myScore, oppScore);
          } else {
            alert('Score sheet not available.');
          }
        });
      }
      var logBtn = document.getElementById('online-btn-log');
      if (logBtn) {
        logBtn.addEventListener('click', function (ev) {
          ev.preventDefault();
          if (window.AMath && window.AMath.gameLog && window.AMath.gameLog.show) {
            window.AMath.gameLog.show();
          } else {
            alert('Game log not available.');
          }
        });
      }
      var setBtn = document.getElementById('online-btn-settings');
      if (setBtn) {
        setBtn.addEventListener('click', function (ev) {
          ev.preventDefault();
          if (window.AMath && window.AMath.settings && window.AMath.settings.showPopup) {
            window.AMath.settings.showPopup();
          } else {
            alert('Settings not available.');
          }
        });
      }
    })();

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
