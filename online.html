<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A-Math — Online Room</title>
  <link rel="stylesheet" href="styles.css?v=v57-landscape">
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Outfit', sans-serif; }
    /* The outer room-wrap is the waiting-room shell. Once a game starts the
       PvA-style layout takes over inside #room-content, which is wrapped by
       #app to inherit the PvA edge-to-edge board sizing rules. Wrap no longer
       caps width so #app can claim full screen width on mobile/tablet. */
    .room-wrap { margin: 0 auto; padding: 14px 0 0 0; }
    .room-header, .players-row, .room-status { padding: 0 14px; max-width: 900px; margin-left: auto; margin-right: auto; }
    /* When the game has started, #room-content holds the PvA layout —
       remove side padding so the board can claim full screen width on
       mobile (matches PvA which has zero side padding on small screens). */
    #room-content { padding: 0; margin: 0; }
    .room-header {
      display: flex; justify-content: space-between; align-items: center;
      gap: 10px; margin-bottom: 12px;
      flex-wrap: wrap;  /* on narrow phones, code drops to its own row */
    }
    .room-header-tools {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
    }
    .room-header-tool-btn {
      background: #334155; color: #e2e8f0; border: none;
      padding: 8px 12px; border-radius: 6px; cursor: pointer;
      font-size: 16px; line-height: 1;
      min-width: 40px; min-height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .room-header-tool-btn:active { background: #475569; }
    .room-code-display {
      background: #1e293b; padding: 8px 14px; border-radius: 8px;
      border: 2px dashed #fbbf24;
      font-family: monospace; font-size: 20px; font-weight: 700;
      letter-spacing: 4px; color: #fbbf24; cursor: pointer;
    }
    .room-code-display:hover { background: #334155; }
    .room-back { color: #94a3b8; text-decoration: none; font-size: 14px; }
    .room-back:hover { color: #fbbf24; }
    .room-status {
      background: #1e293b; padding: 14px; border-radius: 8px;
      margin: 10px 0; text-align: center;
    }
    .room-status.waiting { border: 1px solid #fbbf24; }
    .room-status.playing { border: 1px solid #86efac; }
    .room-status.finished { border: 1px solid #93c5fd; }
    .players-row { display: flex; gap: 10px; margin: 12px 0; }
    .player-card {
      flex: 1; background: #1e293b; padding: 10px; border-radius: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .player-card.active { border: 2px solid #fbbf24; }
    .player-card img { width: 36px; height: 36px; border-radius: 50%; }
    .player-card .pname { font-weight: 600; }
    .player-card .pscore { font-size: 24px; color: #fbbf24; font-weight: 700; }
    .mvp-warning {
      background: #422006; color: #fbbf24; padding: 10px; border-radius: 6px;
      font-size: 13px; margin: 12px 0; border: 1px solid #92400e;
    }
    .copy-feedback {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      background: #16a34a; color: white; padding: 8px 14px; border-radius: 6px;
      z-index: 99999; opacity: 0; transition: opacity .3s;
      /* CRITICAL: this floating "Copied!" toast is permanently in the DOM
         with opacity:0 + position:fixed at top center of screen + huge
         z-index 99999. Even invisible it intercepts touches sitting above
         everything else (incl. the header buttons one row below).
         pointer-events:none lets taps pass through to whatever's behind
         when the toast isn't being shown. */
      pointer-events: none;
    }
    .copy-feedback.show { opacity: 1; }

    /* Online PvP has no desktop 3-column side panel, so the shared rule that
       hides #tile-tracker-panel on wide screens (expecting a side panel that
       doesn't exist here) would leave online players with no tracker on
       desktop. Show the inline panel at all widths on this page only. */
    #tile-tracker-panel {
      display: block;
      margin: 10px auto 0;
      max-width: 700px;
    }
  </style>
</head>
<body>
  <div class="room-wrap">
    <div class="room-header">
      <a href="lobby.html" class="room-back">← Leave room</a>
      <div class="room-header-tools">
        <!-- Mid-game access to PvA-style modules brought into online PvP.
             Diagnostic note: 📊 was originally first in the row but the
             user reported no taps registered for that single button (the
             ⚙️ and 📜 worked). Reordered so the buttons are now
             ⚙️ 📜 📊 — if 📊 now works, the issue was layout overlap
             of the leftmost button (something extending from the Leave
             room link or some hidden element).
             Each button uses both 'click' and explicit 'touchend' to
             cover any mobile browser quirks where one but not the other
             gets dispatched. -->
        <button id="online-btn-settings" type="button" class="room-header-tool-btn"
                title="Settings" aria-label="Settings">⚙️</button>
        <button id="online-btn-log" type="button" class="room-header-tool-btn"
                title="Game log" aria-label="Game log">📜</button>
        <button id="online-btn-sheet" type="button" class="room-header-tool-btn"
                title="Score sheet" aria-label="Score sheet">📊</button>
      </div>
      <div class="room-code-display" id="room-code"
           onclick="copyRoomCode()" role="button" tabindex="0">…</div>
    </div>

    <!-- Player cards & MVP warning hidden when the game is in progress -
         the PvA-style layout below shows player names + scores natively.
         These cards are still rendered (for the waiting screen) but hidden
         while playing. -->
    <div class="players-row" id="players-row">
      <div class="player-card" id="host-card">
        <div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>
        <div>
          <div class="pname">…</div>
          <div style="font-size:11px;color:#94a3b8;">Host</div>
        </div>
        <div class="pscore" style="margin-left:auto;">0</div>
      </div>
      <div class="player-card" id="guest-card">
        <div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>
        <div>
          <div class="pname">Waiting…</div>
          <div style="font-size:11px;color:#94a3b8;">Guest</div>
        </div>
        <div class="pscore" style="margin-left:auto;">0</div>
      </div>
    </div>

    <div class="room-status waiting" id="room-status">Loading…</div>

    <!-- #app wrapper matches PvA's index.html so the .amath-app layout
         inside renders with the same cell-size variables and full screen
         width on mobile. -->
    <div id="app">
      <div id="room-content"></div>
    </div>
  </div>

  <div id="copy-feedback" class="copy-feedback">Copied to clipboard!</div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js?v=20260526m"></script>
  <!-- Game-core modules required by the online controller -->
  <script src="js/constants.js?v=20260526m"></script>
  <script src="js/utils.js?v=20260526m"></script>
  <script src="js/evaluator.js?v=20260526m"></script>
  <script src="js/bag.js?v=20260526m"></script>
  <script src="js/rack.js?v=20260526m"></script>
  <script src="js/board.js?v=20260526m"></script>
  <script src="js/scoring.js?v=20260526m"></script>
  <script src="js/placement.js?v=20260526m"></script>
  <script src="js/ui.js?v=20260526m"></script>
  <script src="js/online-room.js?v=20260526m"></script>
  <script src="js/game-bridge.js?v=20260526m"></script>
  <!-- PvA feature modules brought into online PvP per user request: timer
       skipped, education off, trash-talk skipped. Everything else loaded
       so online has settings (themes), sounds, animations, game log, tile
       tracker, score sheet, and challenge module. -->
  <script src="js/settings.js?v=20260526m"></script>
  <script src="js/sounds.js?v=v55-tilesound"></script>
  <script src="js/animations.js?v=20260526m"></script>
  <script src="js/game-log.js?v=20260526m"></script>
  <script src="js/tile-tracker.js?v=20260526m"></script>
  <script src="js/score-sheet.js?v=20260526m"></script>
  <script src="js/challenge.js?v=20260526m"></script>
  <script src="js/online-game.js?v=v60-clocksync"></script>
  <script>
    var roomCode = new URLSearchParams(window.location.search).get('room');
    var role = new URLSearchParams(window.location.search).get('role');

    function copyRoomCode() {
      if (!roomCode) return;
      navigator.clipboard.writeText(roomCode).then(function () {
        var fb = document.getElementById('copy-feedback');
        fb.classList.add('show');
        setTimeout(function () { fb.classList.remove('show'); }, 1500);
      });
    }

    function renderHeader(data) {
      document.getElementById('room-code').textContent = roomCode || '???';

      var hostCard = document.getElementById('host-card');
      hostCard.innerHTML =
        (data.hostPhoto
          ? '<img src="' + data.hostPhoto + '" alt="">'
          : '<div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>') +
        '<div><div class="pname">' + escapeHtml(data.hostName || 'Host') + '</div>' +
        '<div style="font-size:11px;color:#94a3b8;">Host' +
        (role === 'host' ? ' · you' : '') + '</div></div>' +
        '<div class="pscore" style="margin-left:auto;">' + (data.hostScore || 0) + '</div>';

      var guestCard = document.getElementById('guest-card');
      if (data.guestUid) {
        guestCard.innerHTML =
          (data.guestPhoto
            ? '<img src="' + data.guestPhoto + '" alt="">'
            : '<div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>') +
          '<div><div class="pname">' + escapeHtml(data.guestName || 'Guest') + '</div>' +
          '<div style="font-size:11px;color:#94a3b8;">Guest' +
          (role === 'guest' ? ' · you' : '') + '</div></div>' +
          '<div class="pscore" style="margin-left:auto;">' + (data.guestScore || 0) + '</div>';
      } else {
        guestCard.innerHTML =
          '<div style="width:36px;height:36px;border-radius:50%;background:#334155;"></div>' +
          '<div><div class="pname" style="color:#64748b;">Waiting…</div>' +
          '<div style="font-size:11px;color:#94a3b8;">Guest</div></div>';
      }

      if (data.status === 'playing' && data.turn) {
        hostCard.classList.toggle('active', data.turn === 'host');
        guestCard.classList.toggle('active', data.turn === 'guest');
      }

      var statusEl = document.getElementById('room-status');
      statusEl.classList.remove('waiting', 'playing', 'finished');
      if (data.status === 'waiting') {
        statusEl.classList.add('waiting');
        statusEl.innerHTML = role === 'host'
          ? '⏳ Waiting for a guest to join with code <b>' + roomCode + '</b>.<br>' +
            '<span style="font-size:12px;color:#94a3b8;">Tap the code at the top to copy.</span>'
          : '⏳ Joined! Waiting for game to start…';
      } else if (data.status === 'playing') {
        statusEl.classList.add('playing');
        statusEl.innerHTML = data.turn === role
          ? '✅ Your turn — make a move'
          : '⏱️ Opponent thinking…';
      } else if (data.status === 'finished') {
        statusEl.classList.add('finished');
        var winnerName = data.winner === 'host' ? data.hostName
                       : data.winner === 'guest' ? data.guestName : 'Tie';
        statusEl.innerHTML = '🏁 Game over — ' + escapeHtml(winnerName);
      }
    }

    // online-game.js calls this via window.AMathOnlineHeader (defined below)
    window.AMathOnlineHeader = { render: renderHeader };

    // Wire the header utility buttons (score sheet / game log / settings).
    // These are visible throughout the game so users can check progress
    // or open settings at any point.
    //
    // CRITICAL: wire IMMEDIATELY rather than inside DOMContentLoaded —
    // this inline script runs at end-of-body after all the elements
    // already exist, AND by this point DOMContentLoaded may have already
    // fired (especially if any earlier <script> blocked parsing). A
    // listener attached after DOMContentLoaded fires never runs.
    (function wireHeaderButtons() {
      function attachTapHandler(btn, fn) {
        if (!btn) return;
        // Bind both click and touchend so any mobile browser quirk where
        // one event is suppressed doesn't break the button. We guard
        // against double-fire on the same tap with a 'handled' flag
        // that the touchend listener sets and click clears.
        var handling = false;
        function handler(ev) {
          if (handling) return;
          handling = true;
          setTimeout(function () { handling = false; }, 300);
          ev.preventDefault();
          try { fn(); }
          catch (err) {
            console.error('Header tap handler error:', err);
            alert('Error: ' + (err && err.message ? err.message : err));
          }
        }
        btn.addEventListener('click', handler);
        btn.addEventListener('touchend', handler);
      }

      attachTapHandler(document.getElementById('online-btn-sheet'), function () {
        if (typeof window.openOnlineScoreSheet === 'function') {
          window.openOnlineScoreSheet();
        } else {
          alert('Score sheet helper not loaded.');
        }
      });
      attachTapHandler(document.getElementById('online-btn-log'), function () {
        if (window.AMath && window.AMath.gameLog && window.AMath.gameLog.show) {
          window.AMath.gameLog.show();
        } else {
          alert('Game log not available.');
        }
      });
      attachTapHandler(document.getElementById('online-btn-settings'), function () {
        if (window.AMath && window.AMath.settings && window.AMath.settings.showPopup) {
          window.AMath.settings.showPopup();
        } else {
          alert('Settings not available.');
        }
      });
    })();

    /**
     * Render the score sheet popup using inline styles only — does NOT rely
     * on the score-sheet.js .showPopup() which uses CSS classes that may not
     * resolve correctly in the online.html context (user reported the popup
     * never appeared, while settings + game-log popups work fine; the
     * difference is the latter use inline styles).
     *
     * Reads the entries from window.AMath.scoreSheet.getAllEntries(), or
     * shows an empty-state if the module isn't loaded.
     *
     * Exposed on window so online-game.js can call this from the game-end
     * card's Score Sheet button.
     */
    window.openOnlineScoreSheet = function () {
      // Remove any existing instance
      var existing = document.getElementById('online-score-sheet-overlay');
      if (existing) existing.remove();

      var og = window.AMath && window.AMath.onlineGame;
      var role = og && og.getRole && og.getRole();
      var data = og && og.getRoomData && og.getRoomData();
      var myName = 'You';
      var oppName = 'Opponent';
      var myScore = 0, oppScore = 0;
      if (data) {
        myScore = role === 'host' ? (data.hostScore || 0) : (data.guestScore || 0);
        oppScore = role === 'host' ? (data.guestScore || 0) : (data.hostScore || 0);
        oppName = role === 'host'
          ? (data.guestName || 'Guest')
          : (data.hostName || 'Host');
      }

      var entries = [];
      if (window.AMath && window.AMath.scoreSheet
          && window.AMath.scoreSheet.getAllEntries) {
        try { entries = window.AMath.scoreSheet.getAllEntries() || []; } catch (e) {}
      }

      // Build overlay
      var overlay = document.createElement('div');
      overlay.id = 'online-score-sheet-overlay';
      overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;' +
        'background:rgba(0,0,0,0.65);z-index:10001;display:flex;' +
        'align-items:center;justify-content:center;padding:16px;';

      var dialog = document.createElement('div');
      dialog.style.cssText = 'background:#ffffff;color:#1f2937;border-radius:12px;' +
        'padding:20px;max-width:520px;width:100%;max-height:85vh;display:flex;' +
        'flex-direction:column;box-shadow:0 12px 36px rgba(0,0,0,0.4);';

      // Header
      var header = document.createElement('div');
      header.style.cssText = 'display:flex;justify-content:space-between;' +
        'align-items:center;margin-bottom:12px;';
      var title = document.createElement('h2');
      title.textContent = '📊 Score Sheet';
      title.style.cssText = 'margin:0;font-size:20px;font-weight:700;color:#1f2937;';
      var closeBtn = document.createElement('button');
      closeBtn.textContent = '✕';
      closeBtn.style.cssText = 'background:none;border:none;font-size:24px;' +
        'cursor:pointer;padding:4px 10px;color:#6b7280;';
      closeBtn.onclick = function () { overlay.remove(); };
      header.appendChild(title);
      header.appendChild(closeBtn);
      dialog.appendChild(header);

      // Totals
      var totals = document.createElement('div');
      totals.style.cssText = 'display:flex;justify-content:space-around;' +
        'background:#f3f4f6;padding:12px;border-radius:8px;margin-bottom:14px;' +
        'font-size:15px;';
      totals.innerHTML =
        '<div><span style="color:#6b7280;">' + escapeHtml(oppName) + ':</span> ' +
        '<b style="color:#1f2937;">' + oppScore + '</b></div>' +
        '<div><span style="color:#6b7280;">' + escapeHtml(myName) + ':</span> ' +
        '<b style="color:#1f2937;">' + myScore + '</b></div>';
      dialog.appendChild(totals);

      // Table
      var tableWrap = document.createElement('div');
      tableWrap.style.cssText = 'overflow-y:auto;flex:1;min-height:0;';
      var table = document.createElement('table');
      table.style.cssText = 'width:100%;border-collapse:collapse;font-size:14px;';
      var thead = '<thead><tr style="background:#f9fafb;">' +
        '<th style="padding:8px;text-align:left;border-bottom:2px solid #e5e7eb;color:#374151;">' +
        escapeHtml(oppName) + '</th>' +
        '<th style="padding:8px;text-align:center;border-bottom:2px solid #e5e7eb;color:#6b7280;width:50px;">#</th>' +
        '<th style="padding:8px;text-align:right;border-bottom:2px solid #e5e7eb;color:#374151;">' +
        escapeHtml(myName) + '</th>' +
        '</tr></thead>';
      var tbody;
      if (entries.length === 0) {
        tbody = '<tbody><tr><td colspan="3" style="text-align:center;padding:24px;' +
          'color:#9ca3af;">No moves yet</td></tr></tbody>';
      } else {
        tbody = '<tbody>';
        for (var i = 0; i < entries.length; i++) {
          var e = entries[i];
          var isMe = (e.who === 'player');
          var actionText = formatScoreSheetAction(e);
          var bingoStyle = e.isBingo ? 'font-weight:bold;color:#059669;' : '';
          var oppCell = isMe ? '<td></td>' :
            '<td style="padding:6px 8px;text-align:left;border-bottom:1px solid #f3f4f6;' +
            bingoStyle + '">' + actionText + '</td>';
          var meCell = isMe ?
            '<td style="padding:6px 8px;text-align:right;border-bottom:1px solid #f3f4f6;' +
            bingoStyle + '">' + actionText + '</td>' : '<td></td>';
          tbody += '<tr>' + oppCell +
            '<td style="padding:6px 8px;text-align:center;color:#9ca3af;font-size:12px;' +
            'border-bottom:1px solid #f3f4f6;">' + e.turn + '</td>' +
            meCell + '</tr>';
        }
        tbody += '</tbody>';
      }
      table.innerHTML = thead + tbody;
      tableWrap.appendChild(table);
      dialog.appendChild(tableWrap);

      // Backdrop click dismisses
      overlay.addEventListener('click', function (e) {
        if (e.target === overlay) overlay.remove();
      });

      overlay.appendChild(dialog);
      document.body.appendChild(overlay);
    };

    function formatScoreSheetAction(e) {
      if (e.action === 'play') {
        var t = '+' + e.score;
        if (e.isBingo) t += ' 🎉';
        return t;
      }
      if (e.action === 'pass') return 'Pass';
      if (e.action === 'swap') return 'Swap' + (e.swapCount ? ' ' + e.swapCount : '');
      if (e.action === 'challenged') return '⚠️ Challenged';
      if (e.action === 'challenge-failed') return '❌ Failed challenge';
      if (e.action === 'play-uncontested-invalid') return '+0 (let slide)';
      return String(e.score || '');
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
